<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARAFENOZ</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital@1&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #FFFFFF;
      overflow: hidden;
    }

    .glavnaya {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #FFFFFF;
      overflow: hidden;
    }

    /* ════════════════════════════════
       ВИДЕО ФОН
    ════════════════════════════════ */
    .bg-video {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
      mix-blend-mode: exclusion;
      opacity: 0.8;
      z-index: 0;
    }

    /* ── ЛОГОТИП ARAFENOZ (003.jpg повёрнут) ── */
    .logo-image {
      position: absolute;
      width: 9.55vw;
      height: 101.97vh;
      left: calc(50% - 9.55vw/2 - 16.74vw);
      top: calc(50% - 101.97vh/2 + 43.38vh);
      background: url('003.jpg') center/cover no-repeat;
      mix-blend-mode: darken;
      transform: rotate(90deg);
      z-index: 1;
    }

    /* ── byApafenoz.png ПО ЦЕНТРУ ── */
    .center-logo {
      position: absolute;
      width: 57.16vw;
      height: 20vw;
      left: calc(50% - 57.16vw/2 + 0.89vw);
      top: 50%;
      transform: translateY(-50%);
      background: url('byApafenoz.png') center/contain no-repeat;
      mix-blend-mode: darken;
      z-index: 2;
    }

    /* ── ИКОНКИ — icone 2.png ── */
    .icons-group {
      position: absolute;
      left: 16.2vw;
      top: 7.85vh;
      z-index: 3;
    }

    .icons-group img {
      height: 2.6vh;
      width: auto;
      display: block;
    }

    /* ── П.К.Д. — п.к.д..png ── */
    .text-pkd {
      position: absolute;
      left: calc(50% + 31.9vw);
      top: calc(50% + 44.18vh);
      z-index: 3;
    }

    .text-pkd img {
      height: 1.6vh;
      width: auto;
      display: block;
    }

    /* ── ОБЩИЕ СТИЛИ ТЕКСТА ── */
    .label {
      position: absolute;
      font-family: 'IBM Plex Mono', monospace;
      font-style: italic;
      font-weight: 400;
      font-size: 0.73vw;
      line-height: 18px;
      color: #323232;
      white-space: nowrap;
      z-index: 3;
    }

    .text-type {
      left: 27.47vw;
      top: 34.43vh;
    }

    .text-name {
      left: 73.9vw;
      top: 34.56vh;
    }

    .text-creativity {
      left: 66.06vw;
      top: 59.79vh;
    }

    .text-desc {
      left: 27.47vw;
      top: 79.78vh;
      text-transform: uppercase;
    }


    /* ════════════════════════════════
       1440px
    ════════════════════════════════ */
    @media (max-width: 1440px) {

      .center-logo {
        width: 70vw;
        height: 18vw;
        left: calc(50% - 70vw/2 + 0.89vw);
      }

      .icons-group {
        left: 14vw;
        top: 7.5vh;
      }

      .icons-group img {
        height: 2.4vh;
      }

      .text-pkd {
        left: calc(50% + 30vw);
        top: calc(50% + 43vh);
      }

      .text-pkd img {
        height: 1.5vh;
      }

      .label {
        font-size: 0.85vw;
      }

      .text-type {
        left: 24vw;
        top: 33vh;
      }

      .text-name {
        left: 72vw;
        top: 33vh;
      }

      .text-creativity {
        left: 62vw;
        top: 58vh;
      }

      .text-desc {
        left: 24vw;
        top: 78vh;
      }
    }


    /* ════════════════════════════════
       1200px
    ════════════════════════════════ */
    @media (max-width: 1200px) {

      .center-logo {
        width: 80vw;
        height: 18vw;
        left: calc(50% - 80vw/2);
      }

      .icons-group {
        left: 10vw;
        top: 6vh;
      }

      .icons-group img {
        height: 2.2vh;
      }

      .text-pkd {
        left: calc(50% + 28vw);
        top: calc(50% + 42vh);
      }

      .text-pkd img {
        height: 1.4vh;
      }

      .label {
        font-size: 10px;
        line-height: 16px;
      }

      .text-type {
        left: 18vw;
        top: 32vh;
      }

      .text-name {
        left: 70vw;
        top: 32vh;
      }

      .text-creativity {
        left: 60vw;
        top: 57vh;
      }

      .text-desc {
        left: 18vw;
        top: 77vh;
      }
    }


    /* ════════════════════════════════
       375px — МОБИЛЬНЫЙ
    ════════════════════════════════ */
    @media (max-width: 375px) {

      html, body {
        overflow-y: auto;
      }

      .glavnaya {
        width: 100vw;
        height: 100svh;
        min-height: 600px;
      }

      .logo-image {
        display: none;
      }

      .center-logo {
        width: 92vw;
        height: 18vw;
        left: 4vw;
        top: 50%;
        transform: translateY(-50%);
      }

      .icons-group {
        left: 20px;
        top: 20px;
      }

      .icons-group img {
        height: 22px;
      }

      .text-pkd {
        left: auto;
        right: 20px;
        top: auto;
        bottom: 24px;
      }

      .text-pkd img {
        height: 12px;
      }

      .label {
        font-size: 9px;
        line-height: 14px;
        white-space: normal;
      }

      .text-type {
        left: 20px;
        top: 60px;
      }

      .text-name {
        left: auto;
        right: 20px;
        top: 60px;
      }

      .text-creativity {
        left: auto;
        right: 20px;
        top: calc(50% + 60px);
        text-align: right;
        white-space: normal;
        width: 140px;
      }

      .text-desc {
        left: 20px;
        top: auto;
        bottom: 60px;
        width: 80vw;
        white-space: normal;
      }
    }

  </style>
</head>
<body>

<div class="glavnaya">

  <!-- ✅ ВИДЕО ФОН -->
  <video
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
  >
    <source src="bg-video.mp4" type="video/mp4">
    <source src="bg-video.webm" type="video/webm">
  </video>

  <!-- Логотип ARAFENOZ повёрнутый -->
  <div class="logo-image"></div>

  <!-- byApafenoz.png по центру с Darken -->
  <div class="center-logo"></div>

  <!-- Иконки -->
  <div class="icons-group">
    <img src="icone 2.png" alt="иконки" />
  </div>

  <!-- Тексты -->
  <div class="label text-type">ГРАФИЧЕСКИЙ/ВЕБ/ПРОДУКТ</div>
  <div class="label text-name">SAFRONOV DENIS</div>
  <div class="label text-creativity">ТВОРЧЕСТВО, ПОИСК, САМОВЫРАЖЕНИЕ</div>
  <div class="label text-desc">Продуктовый дизайнер с бэкграундом в графике.</div>

  <!-- П.К.Д. -->
  <div class="text-pkd">
    <img src="п.к.д..png" alt="п.к.д." />
  </div>

</div>

</body>
</html>
